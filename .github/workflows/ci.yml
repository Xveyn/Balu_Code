name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install all dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "shared[dev]"
          pip install -e "plugin[dev]"
          pip install build

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest -v

      - name: Build artefact
        run: python -m scripts.build_bhplugin --repo-root . --dist dist/

      - name: Upload artefacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: balu_code-artefacts
          path: dist/
          retention-days: 14

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "shared[dev]"
          pip install -e "plugin[dev]"
          pip install build

      - name: Build artefact
        run: python -m scripts.build_bhplugin --repo-root . --dist dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$GH_REF_NAME" \
            --title "Balu Code $GH_REF_NAME" \
            --notes-file docs/CHANGELOG.md \
            dist/*.bhplugin
